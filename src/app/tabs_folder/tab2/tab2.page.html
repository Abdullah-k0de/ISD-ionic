<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="title_of_page">
      Denton Masjid Prayer Times
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="shooting-star-layer">
    <span></span><span></span><span></span><span></span>
  </div>

  <ion-refresher slot="fixed" [pullMin]="150" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-outline"
      pullingText="اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى سَيِّدِنَا مُحَمَّدٍ"
      refreshingSpinner="crescent"
    >
    </ion-refresher-content>
  </ion-refresher>

  <!-- Prayer Clock (Azan-style circular display) -->
  <ng-container *ngIf="this.httpService.adhans?.data; else loadingOutsideSkeleton">
    <div class="clock-wrapper">
      <app-prayer-clock
        [fajrTime]="this.httpService.adhans.data.salah.at(0)?.fajr || ''"
        [sunriseTime]="this.httpService.adhans.data.salah.at(0)?.sunrise || ''"
        [dhuhrTime]="this.httpService.adhans.data.salah.at(0)?.zuhr || ''"
        [asrTime]="this.httpService.adhans.data.salah.at(0)?.asr || ''"
        [maghribTime]="this.httpService.adhans.data.salah.at(0)?.maghrib || ''"
        [ishaTime]="this.httpService.adhans.data.salah.at(0)?.isha || ''"
        [iqamaFajr]="iqamaTimes.fajr"
        [iqamaDhuhr]="iqamaTimes.dhuhr"
        [iqamaAsr]="iqamaTimes.asr"
        [iqamaMaghrib]="iqamaTimes.maghrib"
        [iqamaIsha]="iqamaTimes.isha"
      ></app-prayer-clock>
    </div>

    <!-- Jummah & Links (below clock) -->
    <div class="jummah-section">
      <div class="jummah-card">
        <div class="jummah-row">
          <span class="jummah-label">Jummah (ISD)</span>
          <span class="jummah-time">{{this.httpService.adhans.data.iqamah.at(0)?.jummah1}}</span>
        </div>
        <div class="jummah-address">
          <a (click)="openMapsApp('1105 Greenlee St, Denton')">1105 Greenlee St, Denton</a>
        </div>


      </div>

      <a class="monthly-link" href="https://masjidal.com/widget/monthly/?masjid_id=O8L7ppA5&jumuah_text=ISD%20Jummah">
        MONTHLY CALENDAR
      </a>
    </div>
  </ng-container>

  <ng-template #loadingOutsideSkeleton>
    <div class="loading-wrapper">
      <ion-skeleton-text animated class="loading-skeleton"></ion-skeleton-text>
    </div>
  </ng-template>

</ion-content>
