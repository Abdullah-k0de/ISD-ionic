<ion-header >
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button default-href="" (click)="close()"></ion-back-button>
    </ion-buttons>
    <ion-title class="title_of_page">{{ surahName }}</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content  id="main-content">
  <ion-list *ngFor="let ayah of surahText; let i = index" lines="none" [id]="'ayah-' + (i+1)">
    <ion-item [class.ayah-highlight]="currentAyahNumber === ayah.numberInSurah">
      <ion-label class="ayah-text" [ngStyle]="{'font-size': fontSize + 'px'}">
        <div class="arabic-text">{{ ayah.text }}
          <div class="surah-number-circle">
            <ion-text style="font-size: medium;">{{ i + 1 }}</ion-text>
          </div>
        </div>
      </ion-label>
    </ion-item>
    <ion-button fill="clear" slot="start" size="medium" (click)="playAudio(ayah.numberInSurah, ayah.audio)">
      <ion-icon [name]="currentAyahNumber === ayah.numberInSurah && isPlaying ? 'pause' : 'play'"></ion-icon>
    </ion-button>
    <ion-button fill="clear" slot="start" size="medium" (click)="shareAyah(ayah.text, surahTextTranslation[i].text)"
      aria-label="Share Ayah">
      <ion-icon slot="icon-only" name="share-social"></ion-icon>
    </ion-button>
    <ion-item *ngIf="translationMode" class="transparent" lines="none">
      <div class="translation-text">{{ surahTextTranslation[i]?.text }}</div>
    </ion-item>
  </ion-list>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="footer-controls">
      <ion-button expand="block" class="footer-play-btn-wide" (click)="toggleGlobalPlayPause()">
        <ion-icon slot="start" [name]="isPlaying ? 'pause' : 'play'">
        </ion-icon>
        Ayah {{ currentAyahNumber }}
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>


<ion-menu side="end" menuId="fontSizeMenu" contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Settings</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="closeMenu()">
          <ion-icon class="icon-only" name="close-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-list>
      <ion-item lines="none">
        <ion-range min="14" max="26" [value]="20" [pin]="true" [(ngModel)]="fontSize" labelPlacement="stacked"
          label="Font Size" (ionChange)="updateFontSize()" aria-label="Font Size Range">
          <ion-label slot="start" style="font-size: x-small;">A</ion-label>
          <ion-label slot="end" style="font-size: x-large;">A</ion-label>
        </ion-range>
      </ion-item>
      <ion-item lines="full">
        <ion-label style="width: 100%; text-align: center;" [ngStyle]="{'font-size': fontSize + 'px'}">
          <div class="arabic-preview" style="font-size: 1.7em;">
            بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ
          </div>
        </ion-label>
      </ion-item>
      <ion-item lines="full">
        <ion-label>Translation</ion-label>
        <ion-toggle aria-label="Translation mode" color="success" slot="end" justify="space-between"
          (click)="toggleTranslationMode()"></ion-toggle>
      </ion-item>

      <ion-item>
        <ion-label position="floating" style="font-size: small;">Select Reciter</ion-label>
        <ion-select style="font-size: small;" #reciterSelect [(ngModel)]="selectedReciterId" interface="alert"
          [interfaceOptions]="{ cssClass: 'theme-alert', header: 'Select Reciter' }" (ionChange)="onReciterChange()">
          <ion-select-option *ngFor="let reciter of reciters" [value]="reciter.identifier">
            <ng-container *ngIf="reciter.language === 'en'; else arabicTemplate">
              {{ reciter.name }}
            </ng-container>
            <ng-template #arabicTemplate>
              {{ reciter.englishName }} - {{ reciter.name }}
            </ng-template>
          </ion-select-option>
        </ion-select>
      </ion-item>


      <ion-item lines="full">
        <ion-searchbar [(ngModel)]="ayahNumber" type="number" placeholder="Ayah Number"
          (ionInput)="onSearchAyah($event)">
        </ion-searchbar>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>

<audio #audioPlayer></audio>
